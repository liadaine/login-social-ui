<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Formulário de login para acesso a plataforma">
    <link rel="shortcut icon" href="img/icon12.png" type="image/x-icon">
    <meta name="author" content="Lia Alvarez">
    <script src="https://kit.fontawesome.com/226ebfd27f.js" crossorigin="anonymous"></script>
    <title>Login Formulário</title>
</head>
<body>
    <div class="container">
        <form action="#">
            <div class="title">Login</div>
            <div class="input-box">
                <input type="text" placeholder="Insira seu email" required>
                <div class="underline"></div>
            </div>
             <div class="input-box">
                <input type="password" placeholder="Insira sua senha" required>
                <div class="underline"></div>
            </div>
             <div class="input-box button">
                <input type="submit" value="Continue">
            </div>
        </form>
        <div class="option">ou conecte com suas Redes Sociais</div>
        <div class="twitter">
            <a href="#"><i class="fab fa-twitter"></i>Entre com Twitter</a>
        </div>
         <div class="facebook">
            <a href="#"><i class="fab fa-facebook-f"></i>Entre com Facebook</a>
        </div>
    </div>
</body>
</html>
